name: Keep Render Awake

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          # The status endpoint should be reachable to keep Render awake.
          # We use "https://familydrive.onrender.com/api/status" based on the RENDER_EXTERNAL_URL in your code.
          # Change this URL if your app's domain is different.
          curl -I https://familydrive.onrender.com/api/status
          echo "Render service pinged at $(date)"
