<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <svg viewBox="0 0 24 24" class="logo-icon" style="width: 48px; height: 48px; fill: none;">
                <path d="M3 10L12 2L21 10V20C21 21.1046 20.1046 22 19 22H5C3.89543 22 3 21.1046 3 20V10Z"
                    stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path
                    d="M12 7C12 7 10 10 10 12C10 13.1046 10.8954 14 12 14C13.1046 14 14 13.1046 14 12C14 10 12 7 12 7Z"
                    fill="#F59E0B" />
                <circle cx="12" cy="18" r="1.5" fill="var(--primary-color)" />
                <circle cx="9" cy="18" r="1" fill="var(--primary-color)" />
                <circle cx="15" cy="18" r="1" fill="var(--primary-color)" />
            </svg>
            <h2>Bienvenido</h2>
            <p class="auth-subtitle">Inicia sesión en Garaje Familiar</p>
        </div>



        <form (ngSubmit)="login()" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" [(ngModel)]="credentials.email" name="email"
                        placeholder="ejemplo@correo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper" style="position: relative;">
                    <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="credentials.password"
                        name="password" placeholder="••••••••" required style="padding-right: 2.5rem;">
                    <button type="button" class="icon-btn" (click)="togglePasswordVisibility()" tabindex="-1"
                        style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center;">
                        <svg *ngIf="!showPassword" viewBox="0 0 24 24"
                            style="width: 1.2rem; height: 1.2rem; fill: currentColor;">
                            <path
                                d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                        </svg>
                        <svg *ngIf="showPassword" viewBox="0 0 24 24"
                            style="width: 1.2rem; height: 1.2rem; fill: currentColor;">
                            <path
                                d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.39 2.72-3.13 3.44-5.04-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" [disabled]="isLoading" [class.loading]="isLoading">
                <span *ngIf="!isLoading">Iniciar Sesión</span>
                <span *ngIf="isLoading">Iniciando...</span>
                <svg *ngIf="!isLoading" viewBox="0 0 24 24"
                    style="width: 20px; height: 20px; fill: currentColor; margin-left: 8px;">
                    <path
                        d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z" />
                </svg>
                <svg *ngIf="isLoading" viewBox="0 0 24 24" class="spin"
                    style="width: 20px; height: 20px; fill: currentColor; margin-left: 8px;">
                    <path
                        d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm-8 8c0 1.57.46 3.03 1.24 4.26L6.7 14.8C6.25 13.97 6 13.01 6 12c0-3.31 2.69-6 6-6V3l4 4-4 4V8c-3.31 0-6 2.69-6 6z" />
                </svg>
            </button>
        </form>

        <div class="auth-footer">
            <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
        </div>
    </div>
</div>
