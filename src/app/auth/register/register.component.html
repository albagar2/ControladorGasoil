<div class="auth-container">
    <div class="auth-card register-card-width">
        <div class="auth-header">
            <svg viewBox="0 0 24 24" class="logo-icon" style="width: 48px; height: 48px; fill: none;">
                <path d="M3 10L12 2L21 10V20C21 21.1046 20.1046 22 19 22H5C3.89543 22 3 21.1046 3 20V10Z"
                    stroke="var(--logo-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path
                    d="M12 7C12 7 10 10 10 12C10 13.1046 10.8954 14 12 14C13.1046 14 14 13.1046 14 12C14 10 12 7 12 7Z"
                    fill="var(--logo-accent)" />
                <circle cx="12" cy="18" r="1.5" fill="var(--logo-primary)" />
                <circle cx="9" cy="18" r="1" fill="var(--logo-primary)" />
                <circle cx="15" cy="18" r="1" fill="var(--logo-primary)" />
            </svg>
            <h2>Crear Cuenta</h2>
            <p class="auth-subtitle">Únete al equipo de Garaje Familiar</p>
        </div>

        <div *ngIf="errorMessage" class="error-alert">
            <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor; margin-right: 8px;">
                <path
                    d="M11 15h2v2h-2v-2zm0-8h2v6h-2V7zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" />
            </svg>
            <span>{{ errorMessage }}</span>
        </div>

        <form (ngSubmit)="register()" class="auth-form">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <div class="input-wrapper">
                    <input type="text" id="nombre" [(ngModel)]="driver.nombre" name="nombre" required
                        placeholder="Juan Pérez">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="dni">DNI</label>
                    <div class="input-wrapper">
                        <input type="text" id="dni" [(ngModel)]="driver.dni" name="dni" required
                            placeholder="12345678A">
                    </div>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <div class="input-wrapper">
                        <input type="text" id="telefono" [(ngModel)]="driver.telefono" name="telefono" required
                            placeholder="600123456">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" [(ngModel)]="driver.email" name="email" required
                        placeholder="ejemplo@correo.com">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper" style="position: relative;">
                        <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="driver.password"
                            name="password" required placeholder="••••••••" style="padding-right: 2.5rem;">
                        <button type="button" class="icon-btn" (click)="togglePasswordVisibility()" tabindex="-1"
                            style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center;">
                            <svg *ngIf="!showPassword" viewBox="0 0 24 24"
                                style="width: 1.2rem; height: 1.2rem; fill: currentColor;">
                                <path
                                    d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                            </svg>
                            <svg *ngIf="showPassword" viewBox="0 0 24 24"
                                style="width: 1.2rem; height: 1.2rem; fill: currentColor;">
                                <path
                                    d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.39 2.72-3.13 3.44-5.04-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Repetir Contraseña</label>
                    <div class="input-wrapper" style="position: relative;">
                        <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword"
                            [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="••••••••"
                            style="padding-right: 2.5rem;"
                            [class.invalid-input]="driver.password && confirmPassword && driver.password !== confirmPassword">
                        <button type="button" class="icon-btn" (click)="toggleConfirmPasswordVisibility()" tabindex="-1"
                            style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center;">
                            <svg *ngIf="!showConfirmPassword" viewBox="0 0 24 24"
                                style="width: 1.2rem; height: 1.2rem; fill: currentColor;">
                                <path
                                    d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                            </svg>
                            <svg *ngIf="showConfirmPassword" viewBox="0 0 24 24"
                                style="width: 1.2rem; height: 1.2rem; fill: currentColor;">
                                <path
                                    d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.39 2.72-3.13 3.44-5.04-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                            </svg>
                        </button>
                    </div>
                    <small *ngIf="driver.password && confirmPassword && driver.password !== confirmPassword"
                        style="color: #ef4444; font-size: 0.8rem; margin-top: 0.25rem; display: block;">Las contraseñas
                        no coinciden</small>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="role">Rol</label>
                    <div class="input-wrapper">
                        <select id="role" [(ngModel)]="driver.role" name="role" class="styled-select">
                            <option value="conductor">Conductor</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="puntos">Puntos Carnet</label>
                    <div class="input-wrapper">
                        <input type="number" id="puntos" [(ngModel)]="driver.puntos" name="puntos" min="0" max="15"
                            required placeholder="15">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="fechaRenovacionCarnet">Renovación Carnet</label>
                <div class="input-wrapper">
                    <input type="date" id="fechaRenovacionCarnet" [(ngModel)]="driver.fechaRenovacionCarnet"
                        name="fechaRenovacionCarnet" required>
                </div>
            </div>

            <button type="submit" class="btn-submit btn-register" [disabled]="isLoading" [class.loading]="isLoading">
                <span *ngIf="!isLoading">Crear Mi Cuenta</span>
                <span *ngIf="isLoading">Registrando...</span>
                <svg *ngIf="!isLoading" viewBox="0 0 24 24"
                    style="width: 20px; height: 20px; fill: currentColor; margin-left: 8px;">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
                </svg>
                <svg *ngIf="isLoading" viewBox="0 0 24 24" class="spin"
                    style="width: 20px; height: 20px; fill: currentColor; margin-left: 8px;">
                    <path
                        d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm-8 8c0 1.57.46 3.03 1.24 4.26L6.7 14.8C6.25 13.97 6 13.01 6 12c0-3.31 2.69-6 6-6V3l4 4-4 4V8c-3.31 0-6 2.69-6 6z" />
                </svg>
            </button>
        </form>

        <div class="auth-footer">
            <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
        </div>
    </div>
</div>
