<div class="analytics-container fade-in">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon fuel">
                <span class="material-icons">euro</span>
            </div>
            <div class="stat-info">
                <label>Gasto Total Acumulado</label>
                <h3>{{ totalSpent() | number:'1.2-2' }}€</h3>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon efficiency">
                <span class="material-icons">speed</span>
            </div>
            <div class="stat-info">
                <label>Media Consumo (L/100km)</label>
                <h3>{{ averageEfficiency() | number:'1.1-1' }} L</h3>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon records">
                <span class="material-icons">history</span>
            </div>
            <div class="stat-info">
                <label>Registros Totales</label>
                <h3>{{ dataService.refuels().length + dataService.maintenances().length }}</h3>
            </div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <div class="card-header">
                <h3>Histórico de Gastos</h3>
            </div>
            <div class="chart-wrapper">
                <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" [type]="'line'">
                </canvas>
            </div>
        </div>

        <div class="chart-card">
            <div class="card-header">
                <h3>Distribución por Vehículo</h3>
            </div>
            <div class="chart-wrapper">
                <canvas baseChart [data]="pieChartData" [type]="'pie'">
                </canvas>
            </div>
        </div>
    </div>
</div>
